# Railway Project Configuration
[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build && cd api && npm install && npm run db:generate && npm run build"

[deploy]
startCommand = "cd api && npx prisma db push && npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"